name: Build SpeakMe!

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag name for the release (e.g., v0.9.6)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UPX (optional, acelera empaquetado)
        run: choco install upx --no-progress -y
        shell: pwsh

      - name: Build with PyInstaller
        run: pyinstaller SpeakMe.spec --clean --noconfirm

      - name: Clean auto-generated files
        shell: pwsh
        run: |
          $dist = "dist\SpeakMe"
          Remove-Item -Path "$dist\config.json" -ErrorAction SilentlyContinue
          Remove-Item -Path "$dist\vocabulario.json" -ErrorAction SilentlyContinue
          Remove-Item -Path "$dist\historial.json" -ErrorAction SilentlyContinue
          Remove-Item -Path "$dist\notas.json" -ErrorAction SilentlyContinue
          Remove-Item -Path "$dist\*.log" -ErrorAction SilentlyContinue
          Remove-Item -Path "$dist\audio_cache" -Recurse -ErrorAction SilentlyContinue
          Write-Output "Cleaned dist:"
          Get-ChildItem "$dist"

      - name: Package and checksum
        id: package
        shell: pwsh
        run: |
          $dist = "dist\SpeakMe"
          # Usar el nombre del tag como versión: v0.9.5 → SpeakMe_v0.9.5.zip
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "${{ github.event.inputs.version_tag }}" }
          $zipName = "SpeakMe_$version.zip"

          Write-Output "Packaging $zipName ..."
          Compress-Archive -Path @(
            "$dist\_internal",
            "$dist\SpeakMe.exe",
            "$dist\modos.json"
          ) -DestinationPath $zipName -Force

          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$zipName.sha256" -Value $hash

          Write-Output "SHA256: $hash"
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SpeakMe_*.zip
            SpeakMe_*.sha256
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'pre') }}
          generate_release_notes: true
